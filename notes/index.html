atch{}})();</script> </body></html>  <script type="module" src="/_astro/index.astro_astro_type_script_index_0_lang.DmGPea40.js"></script> <script type="application/json" id="notes-posts-data">[{"title":"Linux基金会与Linux操作系统调研报告","date":"2026-07-14","summary":"调研范围：Linux 基金会（Linux Foundation）与 Linux 操作系统（Linux Kernel & OS）——全球最大的开源组织及其最核心的开源项目，以及两者之间\"组织与项目\"的共生关系。","tags":["linux","linux-foundation","open-source","research","report","os"],"category":"research","href":"/notes/2026-07-14-Linux基金会与Linux操作系统调研报告"},{"title":"Anaconda与Miniconda异同调研报告","date":"2026-07-14","summary":"调研范围：Anaconda Distribution（完整版）与 Miniconda（精简版）——两者均由 Anaconda Inc. 维护，底层共享相同的 Conda 包管理引擎。","tags":["python","conda","anaconda","miniconda","report","comparison"],"category":"research","href":"/notes/2026-07-14-Anaconda与Miniconda异同调研报告"},{"title":"MinerU调研报告","date":"2026-07-14","summary":"调研范围：MinerU — 上海人工智能实验室（OpenDataLab）开发的开源智能文档解析引擎，PDF 转 Markdown/JSON 的一站式工具。","tags":["mineru","pdf","document-parsing","research","report","opendatalab"],"category":"research","href":"/notes/2026-07-14-MinerU调研报告"},{"title":"MinerU安装计划_Python3.10环境配置","date":"2026-07-14","summary":"目标：在 Windows 电脑上安装 Miniconda → 创建 Python 3.10 环境 → 安装 MinerU（v3.x `mineru` 包）并启用 GPU 加速","tags":["mineru","pdf","conda","windows","installation","plan"],"category":"research","href":"/notes/2026-07-14-MinerU安装计划_Python3.10环境配置"},{"title":"PyTorch调研报告","date":"2026-07-14","summary":"调研范围：PyTorch — Meta（原 Facebook）开发的开源深度学习框架，当前 AI 研究与开发领域的主流选择。","tags":["pytorch","deep-learning","framework","research","report","meta","ai"],"category":"research","href":"/notes/2026-07-14-PyTorch调研报告"},{"title":"Python虚拟环境工具调研报告","date":"2026-07-14","summary":"调研范围：Python 开发中最主流的三种虚拟环境解决方案——venv（内置）、Conda（数据科学）、uv（新兴极速）","tags":["python","virtualenv","research","report","venv","conda","uv"],"category":"research","href":"/notes/2026-07-14-Python虚拟环境工具调研报告"},{"title":"Python虚拟环境配置指南","date":"2026-07-14","summary":"一句话理解虚拟环境：每个项目拥有自己独立的 Python 解释器和包仓库，互不干扰。项目 A 用 Django 4.2，项目 B 用 Django 5.0——井水不犯河水。","tags":["python","virtualenv","venv","conda","uv","environment","engineering"],"category":"learning","href":"/notes/2026-07-14-Python虚拟环境配置指南"},{"title":"命令行与终端调查说明","date":"2026-07-14","summary":"本文档系统性地梳理命令行工具（CLI）、终端（Terminal）、以及 Shell 之间的关系、演进历史和生态现状。","tags":["技术调查","命令行","终端","Shell","操作系统"],"category":"research","href":"/notes/2026-07-14-命令行与终端调查说明"},{"title":"AI4S材料科学国外项目调研报告","date":"2026-07-13","summary":"调研范围：非中国本土的 AI4S + 材料科学项目、平台、组织","tags":["AI4S","materials-science","research","survey"],"category":"research","href":"/notes/2026-07-13-AI4S材料科学国外项目调研报告"},{"title":"AI4S材料科学项目质量评估指南","date":"2026-07-13","summary":"目的：提供一个系统化的框架，帮助从多个维度分辨 23 个 AI4S 材料科学项目的质量优劣。","tags":["AI4S","materials-science","evaluation","guide"],"category":"learning","href":"/notes/2026-07-13-AI4S材料科学项目质量评估指南"},{"title":"Agent 核心能力全景报告","date":"2026-07-13","summary":"现代 AI Agent 不只是\"聊天机器人\"，而是具备思考、规划、分工、自动化、执行能力的完整智能体系统。其核心能力可归纳为 10 个层面：","tags":["agent","AI","学习笔记","系统架构"],"category":"research","href":"/notes/2026-07-13-Agent 核心能力全景报告"},{"title":"MCP 学习路径","date":"2026-07-13","summary":"MCP 是 Anthropic 推出的开放协议标准，让 AI Agent 能够以统一的方式连接外部数据源和工具。","tags":["MCP","AI","学习路径","系统架构","实践"],"category":"learning","href":"/notes/2026-07-13-MCP 学习路径"},{"title":"OpenScience调研报告","date":"2026-07-13","summary":"调研范围：OpenScience 及其关联项目 Open Science Desktop 的完整调研","tags":["AI4S","open-source","research-platform","AI-workbench"],"category":"research","href":"/notes/2026-07-13-OpenScience调研报告"},{"title":"AI使用者Python基础调研报告","date":"2026-07-12","summary":"报告定位：一份面向「以使用 AI 为目的学习 Python」者的完整技能地图，厘清需要学什么、学到什么程度、按什么顺序学。","tags":["python","AI","learning","report","skill-tree"],"category":"research","href":"/notes/2026-07-12-AI使用者Python基础调研报告"},{"title":"CNN 与视觉皮层","date":"2026-07-12","summary":"CNN（卷积神经网络）是受大脑视觉皮层启发最直接、最成功的 AI 架构。","tags":["neuroscience","ai","cnn","visual-cortex","deep-learning"],"category":"learning","href":"/notes/2026-07-12-CNN 与视觉皮层"},{"title":"MOC-内容地图完全指南","date":"2026-07-12","summary":"MOC = Map of Content（内容地图），一篇专门用来组织和导航其他笔记的笔记。","tags":["obsidian","moc","knowledge-management","methodology"],"category":"learning","href":"/notes/2026-07-12-MOC-内容地图完全指南"},{"title":"MOC-脑功能解剖","date":"2026-07-12","summary":"这是「脑神经科学」知识体系的入口。共 24 篇笔记，分布在 5 个子文件夹。","tags":["moc","neuroscience","brain-anatomy"],"category":"learning","href":"/notes/2026-07-12-MOC-脑功能解剖"},{"title":"Obsidian完美使用工作流","date":"2026-07-12","summary":"将 [[Obsidian知识管理的底层逻辑]] 中的 7 条原则，转化为每天可执行的具体操作。","tags":["obsidian","workflow","methodology","pkm","perfect-use"],"category":"reading","href":"/notes/2026-07-12-Obsidian完美使用工作流"},{"title":"Obsidian知识管理的底层逻辑","date":"2026-07-12","summary":"这不是 Obsidian 的操作教程，而是它背后那套思维方式——理解了这套逻辑，你才知道 Obsidian 到底应该怎么用，以及为什么它和其他笔记软件不一样。","tags":["obsidian","knowledge-management","methodology","pkm"],"category":"learning","href":"/notes/2026-07-12-Obsidian知识管理的底层逻辑"},{"title":"Obsidian限定文件夹知识图谱指南","date":"2026-07-12","summary":"如何将 Obsidian 的图形视图（Graph View）范围限制到某一个文件夹的 Markdown 文件。","tags":["obsidian","graph","knowledge-management","tutorial"],"category":"learning","href":"/notes/2026-07-12-Obsidian限定文件夹知识图谱指南"},{"title":"Parkinson 基底核 多巴胺","date":"2026-07-12","summary":"帕金森病（Parkinson's Disease）是基底核系统中多巴胺神经元渐进性死亡导致的运动障碍疾病。","tags":["neuroscience","parkinson","dopamine","basal-ganglia","movement"],"category":"learning","href":"/notes/2026-07-12-Parkinson 基底核 多巴胺"},{"title":"Transformer 架构","date":"2026-07-12","summary":"一句话定义：Transformer 是一种完全基于 [[自注意力机制]] 的神经网络架构，去掉了传统序列模型中的循环结构，通过并行计算实现了训练效率和长距离依赖建模的双重突破。","tags":["deep-learning","architecture","transformer","nlp","foundation"],"category":"learning","href":"/notes/2026-07-12-Transformer 架构"},{"title":"Transformer 注意力与认知注意力","date":"2026-07-12","summary":"Transformer 的核心机制——自注意力（Self-Attention）——其名称和核心直觉都源于认知神经科学对人类注意力的研究。","tags":["neuroscience","ai","transformer","attention","cognitive-neuroscience"],"category":"research","href":"/notes/2026-07-12-Transformer 注意力与认知注意力"},{"title":"中风与神经可塑性","date":"2026-07-12","summary":"中风是大脑的「局部断电」——但大脑并不会就此「死机」。神经可塑性让大脑在损伤后重新布线，这也是我们关于学习与记忆的核心启示。","tags":["neuroscience","stroke","neuroplasticity","rehabilitation","recovery"],"category":"learning","href":"/notes/2026-07-12-中风与神经可塑性"},{"title":"具身认知：为什么 AI 需要身体","date":"2026-07-12","summary":"具身认知（Embodied Cognition）认为：智能不是只发生在大脑里的计算，而是大脑、身体和环境三者互动的结果。 没有身体，就没有真正的智能。","tags":["neuroscience","ai","embodied-cognition","philosophy","consciousness"],"category":"research","href":"/notes/2026-07-12-具身认知：为什么 AI 需要身体"},{"title":"前额叶皮层与执行功能","date":"2026-07-12","summary":"前额叶皮层（Prefrontal Cortex, PFC）是大脑的「CEO」——负责决策、规划、工作记忆、抑制控制和目标导向行为。","tags":["neuroscience","frontal-lobe","executive-function"],"category":"learning","href":"/notes/2026-07-12-前额叶皮层与执行功能"},{"title":"反向传播 vs 大脑的学习机制","date":"2026-07-12","summary":"反向传播（Backpropagation）是深度学习成功的核心算法，但没有任何证据表明大脑使用了反向传播。那么大脑是怎么学习的？这是当前神经科学与 AI 交叉领域最核心的问题之一。","tags":["neuroscience","ai","backpropagation","learning","hebbian"],"category":"learning","href":"/notes/2026-07-12-反向传播 vs 大脑的学习机制"},{"title":"图论入门：从Obsidian到AI","date":"2026-07-12","summary":"图论是研究「连接」的数学——不关心节点是什么，只关心谁跟谁连在一起。","tags":["graph-theory","math","obsidian","ai","transformer","knowledge-management"],"category":"learning","href":"/notes/2026-07-12-图论入门：从Obsidian到AI"},{"title":"图论的基本问题、方法与研究理论","date":"2026-07-12","summary":"如果说 [[图论入门：从Obsidian到AI]] 是图论的「直觉入门」，","tags":["graph-theory","math","research","methodology"],"category":"learning","href":"/notes/2026-07-12-图论的基本问题、方法与研究理论"},{"title":"基底核与帕金森病","date":"2026-07-12","summary":"基底核（Basal Ganglia）是大脑深处的一组核团，负责运动选择、习惯形成和动作序列学习。帕金森病是其功能失常的代表性疾病。","tags":["neuroscience","basal-ganglia","parkinson","movement"],"category":"learning","href":"/notes/2026-07-12-基底核与帕金森病"},{"title":"大脑脑区与功能全景图","date":"2026-07-12","summary":"人脑约 860 亿 个神经元，组织成不同的脑区，每个区域承担相对特化的功能。这是它们的完整地图。","tags":["neuroscience","brain-anatomy","brain-function","neurobiology"],"category":"research","href":"/notes/2026-07-12-大脑脑区与功能全景图"},{"title":"多巴胺与成瘾的神经机制","date":"2026-07-12","summary":"成瘾是「强化学习系统被劫持」——多巴胺奖励预测误差信号被药物或行为异常放大，导致动机转向失控。","tags":["neuroscience","dopamine","addiction","reinforcement-learning","reward"],"category":"learning","href":"/notes/2026-07-12-多巴胺与成瘾的神经机制"},{"title":"布罗卡区 vs 韦尼克区：语言的两端","date":"2026-07-12","summary":"语言在人类大脑中分为两大功能区：布罗卡区（表达） 和 韦尼克区（理解） 。两者通过弓状束连接。","tags":["neuroscience","language","broca","wernicke","brain"],"category":"reading","href":"/notes/2026-07-12-布罗卡区 vs 韦尼克区：语言的两端"},{"title":"强化学习与多巴胺系统","date":"2026-07-12","summary":"强化学习的核心算法——时序差分学习（TD Learning）——直接受大脑多巴胺神经元的「奖励预测误差」信号启发。","tags":["neuroscience","ai","reinforcement-learning","dopamine","basal-ganglia"],"category":"learning","href":"/notes/2026-07-12-强化学习与多巴胺系统"},{"title":"抑郁症的神经基础","date":"2026-07-12","summary":"抑郁症不是「想开点就能好」的情绪问题——它是涉及前额叶、杏仁核、海马体等多个脑区的神经网络疾病。","tags":["neuroscience","depression","mental-health","prefrontal-cortex","amygdala"],"category":"research","href":"/notes/2026-07-12-抑郁症的神经基础"},{"title":"机器学习与脑神经科学的关系","date":"2026-07-12","summary":"这两个领域的关系不是单向的「A 启发 B」——而是一场持续 80 年的双向对话。","tags":["machine-learning","neuroscience","ai","brain","cross-disciplinary"],"category":"learning","href":"/notes/2026-07-12-机器学习与脑神经科学的关系"},{"title":"杏仁核与焦虑的神经回路","date":"2026-07-12","summary":"杏仁核（Amygdala）是大脑的「情绪警报器」——主要负责恐惧和焦虑情绪的加工、记忆和反应。","tags":["neuroscience","amygdala","emotion","anxiety","temporal-lobe"],"category":"learning","href":"/notes/2026-07-12-杏仁核与焦虑的神经回路"},{"title":"海马体与记忆形成机制","date":"2026-07-12","summary":"海马体（Hippocampus）是大脑的「记忆编码器」和「认知地图绘制者」——它负责将新经历转化为长期记忆，并在大脑中建立空间导航系统。没有海马体，你就无法记住今天发生的任何事。","tags":["neuroscience","hippocampus","memory","LTP","spatial-navigation","consolidation"],"category":"research","href":"/notes/2026-07-12-海马体与记忆形成机制"},{"title":"稀疏编码与大脑节能原理","date":"2026-07-12","summary":"大脑在任何时刻只有 1-4% 的神经元同时活跃（稀疏性），却只需 ~20W 的功率。相比之下，GPT-4 的训练能耗估计超过 50 GWh。大脑的稀疏编码原则可能是下一代高效 AI 的关键。","tags":["neuroscience","ai","sparse-coding","efficiency","energy"],"category":"research","href":"/notes/2026-07-12-稀疏编码与大脑节能原理"},{"title":"精神分裂症的神经基础","date":"2026-07-12","summary":"精神分裂症（Schizophrenia）是大脑的「连接与信号」出了系统性故障——涉及多巴胺异常、前额叶功能下降和广泛的脑网络失连。","tags":["neuroscience","schizophrenia","dopamine","prefrontal-cortex","psychosis"],"category":"research","href":"/notes/2026-07-12-精神分裂症的神经基础"},{"title":"类脑工作流：像大脑一样工作","date":"2026-07-12","summary":"将 [[脑神经科学入门：从神经元到认知]] 中的大脑运作原理，映射到一套可执行的工作流中。","tags":["workflow","neuroscience","productivity","brain","knowledge-management"],"category":"learning","href":"/notes/2026-07-12-类脑工作流：像大脑一样工作"},{"title":"脑损伤与认知康复","date":"2026-07-12","summary":"脑损伤研究是神经科学最古老也最有力的方法之一——通过观察「某部分坏了会发生什么」，反向推断「那部分本来做什么」。认知康复则是应用这些知识来帮助大脑恢复或代偿。","tags":["neuroscience","brain-injury","rehabilitation","case-studies","neuropsychology"],"category":"research","href":"/notes/2026-07-12-脑损伤与认知康复"},{"title":"脑神经科学入门：从神经元到认知","date":"2026-07-12","summary":"脑神经科学（Neuroscience）是研究神经系统的科学——从微观的单个神经元如何放电，到宏观的大脑如何产生意识、记忆和决策。","tags":["neuroscience","brain","cognitive-science","biology","ai"],"category":"learning","href":"/notes/2026-07-12-脑神经科学入门：从神经元到认知"},{"title":"视觉皮层的层级处理","date":"2026-07-12","summary":"视觉皮层从枕叶到颞叶构成了一个层级处理系统——从简单边缘检测到复杂物体识别。这正是 CNN 架构的生物学原型。","tags":["neuroscience","visual-cortex","occipital-lobe","cnn","deep-learning"],"category":"research","href":"/notes/2026-07-12-视觉皮层的层级处理"},{"title":"阿尔兹海默症发病率与受教育程度的关系","date":"2026-07-12","summary":"基于 2024–2026 年最新研究的系统综述","tags":["alzheimer","neurology","education","epidemiology","public-health"],"category":"research","href":"/notes/2026-07-12-阿尔兹海默症发病率与受教育程度的关系"},{"title":"阿尔兹海默症的神经病理","date":"2026-07-12","summary":"阿尔兹海默症的两大核心病理标志：β-淀粉样蛋白斑块（细胞外）和 tau 蛋白神经纤维缠结（细胞内）。","tags":["neuroscience","alzheimer","pathology","amyloid","tau","dementia"],"category":"research","href":"/notes/2026-07-12-阿尔兹海默症的神经病理"},{"title":"2026年AI新概念新技术年度总结","date":"2026-07-11","summary":"生成日期：2026-07-11","tags":["research","AI","2026-summary","technology-review","trends"],"category":"learning","href":"/notes/2026-07-11-2026年AI新概念新技术年度总结"},{"title":"NVIDIA Cosmos调研报告","date":"2026-07-11","summary":"生成日期：2026-07-11","tags":["research","nvidia","cosmos","world-model","physical-ai","robotics"],"category":"research","href":"/notes/2026-07-11-NVIDIA Cosmos调研报告"},{"title":"OpenScience调研报告","date":"2026-07-11","summary":"生成日期：2026-07-11","tags":["research","openscience","AI","scientific-research","open-source"],"category":"research","href":"/notes/2026-07-11-OpenScience调研报告"},{"title":"Atlas调研报告","date":"2026-07-11","summary":"生成日期：2026-07-11","tags":["research","atlas","AI","scientific-research","synthetic-sciences"],"category":"research","href":"/notes/2026-07-11-Atlas调研报告"},{"title":"AI Scientist调研报告","date":"2026-07-11","summary":"生成日期：2026-07-11","tags":["research","ai-scientist","autonomous-research","AI4S","scientific-discovery"],"category":"research","href":"/notes/2026-07-11-AI Scientist调研报告"},{"title":"NSP（Next-State Prediction）调研报告","date":"2026-07-11","summary":"生成日期：2026-07-11","tags":["research","NSP","next-state-prediction","world-model","paradigm","BAAI"],"category":"research","href":"/notes/2026-07-11-NSP（Next-State Prediction）调研报告"},{"title":"Agentic Commerce 智能体商务调研报告","date":"2026-07-11","summary":"Forrester《2026 十大新兴技术》中最接近商业落地的趋势——AI 智能体替你完成购物全流程","tags":["research","ai","agentic-commerce","forrester","ecommerce"],"category":"research","href":"/notes/2026-07-11-Agentic Commerce 智能体商务调研报告"},{"title":"Claude Science 深度调研报告","date":"2026-07-11","summary":"Anthropic 2026 年旗舰产品——AI 驱动的科研工作台，号称\"科研界的 Claude Code\"","tags":["research","anthropic","claude-science","ai","scientific-research"],"category":"research","href":"/notes/2026-07-11-Claude Science 深度调研报告"},{"title":"Layer Zero Experience 深度调研报告","date":"2026-07-11","summary":"Forrester《2026 十大新兴技术》中最具前瞻性的概念——AI 驱动的\"元体验层\"","tags":["research","ai","layer-zero","forrester","experience-design"],"category":"research","href":"/notes/2026-07-11-Layer Zero Experience 深度调研报告"},{"title":"AI开发三周系统学习计划","date":"2026-07-11","summary":"背景：材料科学 + 凝聚态物理本科/硕士，已能用 AI 做网站、搭工作流、调 MCP/hook/skill","tags":["AI学习","plan","bootcamp"],"category":"learning","href":"/notes/2026-07-11-AI开发三周系统学习计划"},{"title":"PyCharm调研报告","date":"2026-07-11","summary":"生成日期：2026-07-11","tags":["research","pycharm","IDE","python","jetbrains"],"category":"research","href":"/notes/2026-07-11-PyCharm调研报告"},{"title":"世界模型调研报告","date":"2026-07-11","summary":"生成日期：2026-07-11","tags":["research","world-model","AI","physical-ai","survey"],"category":"research","href":"/notes/2026-07-11-世界模型调研报告"},{"title":"坚果云调研报告","date":"2026-07-11","summary":"国内专业的文件同步与协作云盘服务商","tags":["research","cloud-storage","nutstore"],"category":"research","href":"/notes/2026-07-11-坚果云调研报告"},{"title":"每日执行模板","date":"2026-07-11","summary":"当前 Block：{{Block名}}","tags":["AI学习/template"],"category":"learning","href":"/notes/2026-07-11-每日执行模板"},{"title":"网站开发环境：从客户机迁移到虚拟机","date":"2026-07-08","summary":"Windows 客户机到 Ubuntu 虚拟机的 Web 开发环境迁移指南，含文件传输方案对比与 VS Code Remote-SSH 工作流。","tags":["开发环境","虚拟机","VS Code","Remote-SSH"],"category":"learning","href":"/notes/dev-env-migration"},{"title":"Git 项目管理指南","date":"2026-07-08","summary":"Git 核心命令、双机协作工作流与版本管理策略，适用于客户机↔虚拟机开发场景。","tags":["Git","开发工具","版本管理"],"category":"learning","href":"/notes/git-project-management"},{"title":"虚拟机 Web 开发环境指南","date":"2026-07-08","summary":"在 Ubuntu 虚拟机中开发网页的优势分析：环境一致、快照还原、隔离干净，以及完整的开发环境搭建步骤。","tags":["开发环境","虚拟机","Linux"],"category":"learning","href":"/notes/vm-dev-env-guide"},{"title":"《深入理解计算机系统》读书笔记","date":"2026-07-01","summary":"阅读 CSAPP 的笔记整理，涵盖信息表示、处理器架构、内存层次等核心概念。","tags":["计算机系统","CSAPP","读书笔记"],"category":"reading","href":"/notes/csapp-reading-notes"}]</script>
